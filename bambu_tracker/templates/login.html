{% extends "base.html" %}
{% block content %}
{% if msg %}
  <div class="msg-{{ kind }}">{{ msg }}</div>
{% endif %}
<div style="max-width:380px;margin:60px auto">
  <div class="card">
    <h2 style="text-align:center;margin-bottom:20px">Sign In</h2>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Username
        <input type="text" name="username" autocomplete="username" required autofocus>
      </label>
      <label style="margin-top:12px">Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px;justify-content:center">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
