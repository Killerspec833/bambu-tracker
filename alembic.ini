[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file.
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a corresponding .py file to be detected.
sourceless = false

# version location — default is alembic/versions
version_locations = %(here)s/alembic/versions

# the output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# NOTE: sqlalchemy.url is intentionally NOT set here.
# The URL is read from config.yaml at runtime in alembic/env.py.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = [sys.stderr]
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
